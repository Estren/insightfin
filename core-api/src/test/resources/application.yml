spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  flyway:
    enabled: false

jwt:
  secret: test-secret-key-for-unit-tests-min-32-characters-long
  expiration-ms: 86400000
