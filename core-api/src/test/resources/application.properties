quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb
quarkus.datasource.username=sa
quarkus.datasource.password=

quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.flyway.migrate-at-start=false

jwt.secret=test-secret-key-for-unit-tests-min-32-characters-long
jwt.expiration-ms=86400000

# Disable Kafka Dev Services and use in-memory channels for tests
quarkus.kafka.devservices.enabled=false
mp.messaging.outgoing.transaction-created.connector=smallrye-in-memory
mp.messaging.outgoing.goal-contributed.connector=smallrye-in-memory
mp.messaging.incoming.transaction-created-in.connector=smallrye-in-memory
