# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/orizon
quarkus.datasource.username=${DB_USERNAME:orizon}
quarkus.datasource.password=${DB_PASSWORD:orizon}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=validate

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# HTTP
quarkus.http.port=8080

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:8080
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=*
quarkus.http.cors.access-control-allow-credentials=true

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.info-title=Orizon Core API
quarkus.smallrye-openapi.info-description=API for personal financial management
quarkus.smallrye-openapi.info-version=0.1.0
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui.html

# JWT
jwt.secret=${JWT_SECRET:orizon-dev-secret-key-change-in-production-min-32-chars}
jwt.expiration-ms=${JWT_EXPIRATION:86400000}
