# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/insightfin
quarkus.datasource.username=${DB_USERNAME:insightfin}
quarkus.datasource.password=${DB_PASSWORD:insightfin}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=validate

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# HTTP
quarkus.http.port=8080

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:8080,http://localhost:4200,https://insightfin.app,https://www.insightfin.app,https://coreapi.insightfin.app,https://core-api.wonderfulbeach-75a29698.brazilsouth.azurecontainerapps.io,https://mango-meadow-0bf177b0f.7.azurestaticapps.net
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=*
quarkus.http.cors.access-control-allow-credentials=true

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.info-title=insightfin Core API
quarkus.smallrye-openapi.info-description=API for personal financial management
quarkus.smallrye-openapi.info-version=0.1.0
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui.html

# JWT
jwt.secret=${JWT_SECRET:insightfin-dev-secret-key-change-in-production-min-32-chars}
jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
kafka.sasl.mechanism=${KAFKA_SASL_MECHANISM:PLAIN}
kafka.sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG:}
kafka.ssl.endpoint.identification.algorithm=https

mp.messaging.outgoing.transaction-created.connector=smallrye-kafka
mp.messaging.outgoing.transaction-created.topic=transaction.created
mp.messaging.outgoing.transaction-created.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.outgoing.goal-contributed.connector=smallrye-kafka
mp.messaging.outgoing.goal-contributed.topic=goal.contributed
mp.messaging.outgoing.goal-contributed.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Budget alerts: core-api consumes its own transaction.created topic to evaluate thresholds.
mp.messaging.incoming.transaction-created-in.connector=smallrye-kafka
mp.messaging.incoming.transaction-created-in.topic=transaction.created
mp.messaging.incoming.transaction-created-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.transaction-created-in.group.id=core-api-budget-alerts
mp.messaging.incoming.transaction-created-in.auto.offset.reset=latest

# Azure Blob Storage
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:UseDevelopmentStorage=true}
azure.storage.container-name=${AZURE_STORAGE_CONTAINER_NAME:avatars}
azure.storage.public-base-url=${AZURE_STORAGE_PUBLIC_BASE_URL:#{null}}

# Azure Communication Services - Email (password reset)
acs.email.enabled=${ACS_EMAIL_ENABLED:false}
acs.email.connection-string=${ACS_EMAIL_CONNECTION_STRING:}
acs.email.sender=${ACS_EMAIL_SENDER:}

# Password reset
app.password-reset.token-ttl-minutes=${PASSWORD_RESET_TTL_MINUTES:30}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:4200}

# Email verification
app.email-verification.required=${EMAIL_VERIFICATION_REQUIRED:true}
app.email-verification.registration-ttl-hours=${EMAIL_VERIFICATION_TTL_HOURS:24}
app.email-verification.pin-max-attempts=${EMAIL_VERIFICATION_PIN_MAX_ATTEMPTS:5}

# Google Sign-In
google.client-id=${GOOGLE_CLIENT_ID:}

# Sentry (error monitoring) - quarkus-logging-sentry extension.
# Off by default; enable in production by setting SENTRY_ENABLED=true and SENTRY_DSN.
quarkus.log.sentry.enabled=${SENTRY_ENABLED:false}
quarkus.log.sentry.dsn=${SENTRY_DSN:}
quarkus.log.sentry.environment=${SENTRY_ENVIRONMENT:production}
quarkus.log.sentry.minimum-event-level=ERROR
quarkus.log.sentry.in-app-packages=com.insightfin.coreapi

# JSON console logging (quarkus-logging-json). On in prod for Log Analytics;
# off in dev/test so local output stays human-readable.
quarkus.log.console.json=true
%dev.quarkus.log.console.json=false
%test.quarkus.log.console.json=false

# Rate limiting (auth endpoints: login, register, forgot-password, resend-verification)
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.requests-per-minute=${RATE_LIMIT_RPM:10}
%dev.app.rate-limit.enabled=false

# Account lockout (failed login attempts). max-attempts=0 disables it.
app.account-lockout.max-attempts=${ACCOUNT_LOCKOUT_MAX_ATTEMPTS:5}
app.account-lockout.duration-minutes=${ACCOUNT_LOCKOUT_MINUTES:15}

# Test profile: skip email verification gating so existing IT tests still hit protected routes.
%test.app.email-verification.required=false
%test.quarkus.log.sentry.enabled=false
%test.app.rate-limit.enabled=false
%test.app.account-lockout.max-attempts=0
