spring:
  application:
    name: core-api

  datasource:
    url: jdbc:postgresql://localhost:5432/orizon
    username: ${DB_USERNAME:orizon}
    password: ${DB_PASSWORD:orizon}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

jwt:
  secret: ${JWT_SECRET:orizon-dev-secret-key-change-in-production-min-32-chars}
  expiration-ms: ${JWT_EXPIRATION:86400000}
