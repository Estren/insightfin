apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: insightfin
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: insightfin
    app.kubernetes.io/component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: insightfin
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: insightfin
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: insightfin-config
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: insightfin-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ['pg_isready', '-U', 'insightfin']
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ['pg_isready', '-U', 'insightfin']
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ['ReadWriteOnce']
        resources:
          requests:
            storage: 5Gi
