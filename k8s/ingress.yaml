apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orizon-ingress
  namespace: orizon
  labels:
    app.kubernetes.io/part-of: orizon
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: core-api
                port:
                  number: 8080
