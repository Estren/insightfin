apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: insightfin
  labels:
    app.kubernetes.io/name: core-api
    app.kubernetes.io/part-of: insightfin
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: core-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: core-api
        app.kubernetes.io/part-of: insightfin
    spec:
      containers:
        - name: core-api
          image: insightfin-core-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: insightfin-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: insightfin-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: insightfin-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
