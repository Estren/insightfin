services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.33.0
    container_name: insightfin-azurite
    ports:
      - '10000:10000'
    command: azurite-blob --blobHost 0.0.0.0

  postgres:
    image: postgres:16
    container_name: insightfin-postgres
    environment:
      POSTGRES_DB: insightfin
      POSTGRES_USER: insightfin
      POSTGRES_PASSWORD: insightfin
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U insightfin']
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.0
    container_name: insightfin-kafka
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list',
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  core-api:
    build:
      context: ./core-api
      dockerfile: Dockerfile
    container_name: insightfin-core-api
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      azurite:
        condition: service_started
    environment:
      DB_USERNAME: insightfin
      DB_PASSWORD: insightfin
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/insightfin
      JWT_SECRET: insightfin-dev-secret-key-change-in-production-min-32-chars
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      AZURE_STORAGE_CONTAINER_NAME: avatars
      AZURE_STORAGE_PUBLIC_BASE_URL: http://localhost:10000/devstoreaccount1
      EMAIL_VERIFICATION_REQUIRED: "false"

  ai:
    build: ./ai
    container_name: insightfin-ai
    ports:
      - '8081:8081'
    depends_on:
      core-api:
        condition: service_started
      kafka:
        condition: service_healthy
    env_file:
      - ./ai/.env
    environment:
      CORE_API_URL: http://core-api:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: ai-service

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: insightfin-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - core-api
      - ai

  grafana:
    image: grafana/grafana:10.4.2
    container_name: insightfin-grafana
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: insightfin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data:
