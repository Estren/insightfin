services:
  postgres:
    image: postgres:16
    container_name: orizon-postgres
    environment:
      POSTGRES_DB: orizon
      POSTGRES_USER: orizon
      POSTGRES_PASSWORD: orizon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orizon"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.7
    container_name: orizon-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  core-api:
    build:
      context: ./core-api
      dockerfile: Dockerfile
    container_name: orizon-core-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_USERNAME: orizon
      DB_PASSWORD: orizon
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/orizon
      JWT_SECRET: orizon-dev-secret-key-change-in-production-min-32-chars
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  ai:
    build: ./ai
    container_name: orizon-ai
    ports:
      - "8081:8081"
    depends_on:
      core-api:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      CORE_API_URL: http://core-api:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: ai-service
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY:-}
      AZURE_OPENAI_MODEL: ${AZURE_OPENAI_MODEL:-gpt-4o-mini}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-08-01-preview}

volumes:
  postgres_data:
