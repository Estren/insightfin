name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-core-api:
    name: Core API — Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn -f core-api/pom.xml test

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: core-api/target/surefire-reports/
          retention-days: 7

  build-frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install dependencies
        working-directory: frontend/web
        run: npm ci

      - name: Lint
        working-directory: frontend/web
        run: npm run lint

      - name: Build
        working-directory: frontend/web
        run: npm run build
