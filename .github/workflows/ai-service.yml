name: ai-service

on:
  push:
    branches: [main]
    paths: [ai/**]
  pull_request:
    branches: [main]
    paths: [ai/**]
  workflow_dispatch:

concurrency:
  group: ai-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ai/requirements.txt

      - name: Install dependencies
        run: pip install -r ai/requirements.txt

      - name: Run tests
        run: |
          cd ai
          pytest tests/ -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push image
        run: |
          docker build -t ${{ secrets.ACR_SERVER }}/ai-service:${{ github.sha }} ai/
          docker push ${{ secrets.ACR_SERVER }}/ai-service:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Container App
        run: |
          az containerapp update \
            --name ai-service \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_SERVER }}/ai-service:${{ github.sha }}
