name: core-api

on:
  push:
    branches: [main]
    paths: [core-api/**]
  pull_request:
    branches: [main]
    paths: [core-api/**]
  workflow_dispatch:

concurrency:
  group: core-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: |
          chmod +x core-api/mvnw
          cd core-api && ./mvnw test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-api-test-report
          path: core-api/target/surefire-reports/
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build
        run: |
          chmod +x core-api/mvnw
          cd core-api && ./mvnw package -DskipTests

      - name: Login ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push image
        run: |
          docker build -t ${{ secrets.ACR_SERVER }}/core-api:${{ github.sha }} core-api/
          docker push ${{ secrets.ACR_SERVER }}/core-api:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Container App
        run: |
          az containerapp update \
            --name core-api \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_SERVER }}/core-api:${{ github.sha }}
