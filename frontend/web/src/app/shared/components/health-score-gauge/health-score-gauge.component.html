<div class="grid grid-cols-1 items-center gap-6 md:grid-cols-2">
  <div class="flex flex-col items-center">
    <apx-chart [series]="series()" [chart]="chart" [plotOptions]="plotOptions()" [fill]="fill()" [stroke]="stroke">
    </apx-chart>
    <p class="text-foreground -mt-2 text-sm font-medium">
      {{ labelKey() | translate }}
    </p>
  </div>

  <div class="grid grid-cols-2 gap-3">
    @for (item of breakdownItems(); track item.key) {
      <div class="bg-muted/30 rounded-md p-3">
        <p class="text-muted-foreground text-xs">{{ item.labelKey | translate }}</p>
        <p class="text-foreground text-lg font-semibold">
          {{ item.value }}
        </p>
      </div>
    }
  </div>
</div>
