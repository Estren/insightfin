<app-modal
  [title]="'avatarCropper.title' | translate"
  size="lg"
  [dismissible]="!uploading()"
  (close)="onCancel()">
  <p class="text-muted-foreground mb-3 text-sm">{{ 'avatarCropper.hint' | translate }}</p>

  <div class="bg-muted overflow-hidden rounded-md">
    <image-cropper
      [imageFile]="file()"
      [maintainAspectRatio]="true"
      [aspectRatio]="1"
      [resizeToWidth]="512"
      [resizeToHeight]="512"
      format="jpeg"
      output="blob"
      [transform]="transform"
      [onlyScaleDown]="false"
      [containWithinAspectRatio]="false"
      (imageCropped)="onCropped($event)"
      (loadImageFailed)="onLoadFailed()"></image-cropper>
  </div>

  <div class="mt-4">
    <label class="text-foreground mb-1 block text-sm font-medium">{{ 'avatarCropper.zoom' | translate }}</label>
    <input
      type="range"
      min="1"
      max="3"
      step="0.05"
      [ngModel]="zoom"
      (ngModelChange)="onZoomChange($event)"
      class="accent-primary w-full" />
  </div>

  <div class="mt-6 flex justify-end gap-2">
    <button
      type="button"
      (click)="onCancel()"
      [disabled]="uploading()"
      class="border-border text-foreground hover:bg-card disabled:opacity-50 cursor-pointer rounded-md border px-4 py-2 text-sm font-medium transition-colors">
      {{ 'common.cancel' | translate }}
    </button>
    <button
      type="button"
      (click)="onConfirm()"
      [disabled]="uploading()"
      class="bg-primary hover:bg-primary/90 disabled:opacity-50 cursor-pointer rounded-md px-4 py-2 text-sm font-medium text-white transition-colors">
      {{ uploading() ? ('profile.saving' | translate) : ('avatarCropper.confirm' | translate) }}
    </button>
  </div>
</app-modal>
