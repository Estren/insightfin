@if (state(); as s) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/50" (click)="cancel()"></div>

    <!-- Card -->
    <div class="bg-background relative z-10 w-full max-w-sm overflow-hidden rounded-lg shadow-xl">
      <div class="px-6 py-6">
        <div class="flex items-start gap-4">
          <div class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-full" [class]="iconClass">
            <svg-icon [src]="iconSrc()" [svgClass]="'h-5 w-5'"></svg-icon>
          </div>
          <div class="flex-1">
            <h3 class="text-foreground text-base font-semibold">{{ s.title | translate }}</h3>
            <p class="text-muted-foreground mt-2 text-sm">
              {{ s.message | translate: s.messageParams }}
            </p>
          </div>
        </div>
      </div>
      <div class="bg-muted/30 flex justify-end gap-2 border-t px-6 py-3">
        <button
          type="button"
          (click)="cancel()"
          class="bg-background hover:bg-muted text-foreground border-border cursor-pointer rounded-md border px-4 py-2 text-sm font-medium transition-colors">
          {{ s.cancelLabel || 'common.cancel' | translate }}
        </button>
        <button
          type="button"
          (click)="confirm()"
          class="cursor-pointer rounded-md px-4 py-2 text-sm font-medium transition-colors"
          [class]="confirmButtonClass">
          {{ s.confirmLabel || 'common.confirm' | translate }}
        </button>
      </div>
    </div>
  </div>
}
