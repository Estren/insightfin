<div class="border-border flex items-center justify-between border-b py-3 last:border-0">
  <div class="flex items-center gap-3">
    <div class="bg-muted h-9 w-9 flex-shrink-0 rounded-md" [style.backgroundColor]="color() || null"></div>
    <div class="min-w-0">
      <p class="text-foreground truncate text-sm font-medium">{{ title() }}</p>
      @if (subtitle()) {
        <p class="text-muted-foreground truncate text-xs">{{ subtitle() }}</p>
      }
    </div>
  </div>
  <div class="ml-4 flex shrink-0 items-center gap-3">
    @if (value()) {
      <span
        class="text-sm font-semibold"
        [class.text-green-500]="positive()"
        [class.text-red-500]="negative()"
        [class.text-foreground]="!positive() && !negative()">
        {{ value() }}
      </span>
    }
    <ng-content></ng-content>
  </div>
</div>
