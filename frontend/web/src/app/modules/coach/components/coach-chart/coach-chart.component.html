<div class="mt-3 rounded-lg border border-border bg-background p-3">
  <div class="mb-2 text-xs font-semibold text-muted-foreground">{{ chart.title }}</div>

  @if (chart.kind === 'line') {
    <apx-chart
      [series]="lineSeries()"
      [chart]="lineChart"
      [xaxis]="lineXaxis()"
      [yaxis]="lineYaxis"
      [stroke]="lineStroke"
      [legend]="lineLegend"
      [dataLabels]="lineDataLabels"
      [colors]="lineColors()"
      [tooltip]="lineTooltip"></apx-chart>
  } @else if (chart.kind === 'donut') {
    <apx-chart
      [series]="donutSeries()"
      [labels]="donutLabels()"
      [chart]="donutChart"
      [legend]="donutLegend"
      [theme]="donutTheme()"
      [tooltip]="donutTooltip"></apx-chart>
  }
</div>
