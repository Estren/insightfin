<div class="mx-auto max-w-2xl p-6">
  <h2 class="text-foreground mb-6 text-2xl font-bold">
    {{ editing ? 'Edit Goal' : 'New Goal' }}
  </h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="bg-card space-y-4 rounded-lg border p-6 shadow-sm">
    <!-- Title -->
    <div>
      <label class="text-foreground mb-1 block text-sm font-medium">Title</label>
      <input
        formControlName="title"
        type="text"
        maxlength="100"
        placeholder="e.g. Emergency fund"
        class="border-input bg-background text-foreground w-full rounded-md border px-3 py-2 text-sm" />
    </div>

    <!-- Target amount -->
    <div>
      <label class="text-foreground mb-1 block text-sm font-medium">Target amount</label>
      <input
        formControlName="targetAmount"
        type="number"
        step="0.01"
        min="0.01"
        placeholder="0.00"
        class="border-input bg-background text-foreground w-full rounded-md border px-3 py-2 text-sm" />
    </div>

    <!-- Deadline -->
    <div>
      <label class="text-foreground mb-1 block text-sm font-medium">Deadline <span class="text-muted-foreground">(optional)</span></label>
      <input
        formControlName="deadline"
        type="date"
        class="border-input bg-background text-foreground w-full rounded-md border px-3 py-2 text-sm" />
    </div>

    @if (errorMessage) {
      <div class="rounded-md bg-red-50 p-3 text-sm text-red-600 dark:bg-red-900/20 dark:text-red-400">
        {{ errorMessage }}
      </div>
    }

    <div class="flex gap-2 pt-2">
      <button
        type="submit"
        [disabled]="form.invalid || submitting"
        class="bg-primary hover:bg-primary/90 rounded-lg px-4 py-2 text-sm font-medium text-white transition-colors disabled:cursor-not-allowed disabled:opacity-50">
        {{ editing ? 'Save' : 'Create' }}
      </button>
      <button
        type="button"
        (click)="onCancel()"
        class="bg-muted text-muted-foreground hover:bg-muted/80 rounded-lg px-4 py-2 text-sm font-medium transition-colors">
        Cancel
      </button>
    </div>
  </form>
</div>
