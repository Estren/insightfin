<app-modal [title]="editing ? ('goals.editModal' | translate) : ('goals.newModal' | translate)" (close)="onCancel()">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <!-- Title -->
    <div>
      <label class="text-foreground mb-1 block text-sm font-medium">{{ 'goals.titleLabel' | translate }}</label>
      <input
        formControlName="title"
        type="text"
        maxlength="100"
        [placeholder]="'goals.titlePlaceholder' | translate"
        class="border-input bg-background text-foreground w-full rounded-md border px-3 py-2 text-sm" />
    </div>

    <!-- Target amount -->
    <div>
      <label class="text-foreground mb-1 block text-sm font-medium">{{ 'goals.targetAmount' | translate }}</label>
      <input
        formControlName="targetAmount"
        type="number"
        step="0.01"
        min="0.01"
        placeholder="0.00"
        class="border-input bg-background text-foreground w-full rounded-md border px-3 py-2 text-sm" />
    </div>

    <!-- Deadline -->
    <div>
      <label class="text-foreground mb-1 block text-sm font-medium">
        {{ 'goals.deadline' | translate }} <span class="text-muted-foreground">{{ 'common.optional' | translate }}</span>
      </label>
      <input
        formControlName="deadline"
        type="date"
        class="border-input bg-background text-foreground w-full cursor-pointer rounded-md border px-3 py-2 text-sm" />
    </div>

    <button
      type="submit"
      [disabled]="form.invalid || submitting"
      class="bg-primary hover:bg-primary/90 mt-2 w-full cursor-pointer rounded-lg px-4 py-2.5 text-sm font-medium text-white transition-colors disabled:cursor-not-allowed disabled:opacity-50">
      {{ editing ? ('goals.saveChanges' | translate) : ('goals.create' | translate) }}
    </button>
  </form>
</app-modal>
