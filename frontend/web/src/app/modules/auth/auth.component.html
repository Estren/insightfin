<div class="flex h-screen w-screen">
  <div class="auth-bg bg-primary hidden flex-1 items-center justify-center bg-cover lg:flex">
    <div class="max-w-2xl space-y-4 p-8 text-center text-white">
      <img src="assets/icons/logo.svg" alt="InsightFin" class="mx-auto w-32 brightness-0 invert" />
      <h1 class="text-4xl font-bold">{{ 'auth.hero.title' | translate }}</h1>
      <p class="text-sm font-light leading-relaxed opacity-90">
        {{ 'auth.hero.description' | translate }}
      </p>
    </div>
  </div>
  <div class="bg-background flex flex-1 items-center justify-center">
    <div class="max-w-md overflow-y-auto px-4 sm:w-[500px]">
      <!-- logo -->
      <div class="flex items-center justify-center gap-2">
        <svg-icon src="assets/icons/logo.svg" [svgClass]="'text-primary h-10 w-10'"> </svg-icon>
        <b class="text-lg text-foreground font-bold"> InsightFin </b>
      </div>
      <!-- Route -->
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
