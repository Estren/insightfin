<app-page-header [title]="'notifications.title' | translate" [subtitle]="'notifications.subtitle' | translate" />

<app-card>
  @if ((store.loading$ | async) && (store.notifications$ | async)?.length === 0) {
    <app-loading />
  } @else if (store.notifications$ | async; as items) {
    @if (items.length === 0) {
      <app-empty-state
        [title]="'notifications.empty' | translate"
        [description]="'notifications.emptyDesc' | translate" />
    } @else {
      <div class="space-y-2">
        @for (n of items; track n.id) {
          <app-notification-card [notification]="n" />
        }
      </div>
      @if (store.hasMore$ | async) {
        <div class="mt-4 flex justify-center">
          <button
            type="button"
            (click)="store.loadMore()"
            [disabled]="(store.loading$ | async) ?? false"
            class="text-primary hover:bg-muted/60 cursor-pointer rounded-md border border-transparent px-4 py-2 text-sm font-medium transition-colors disabled:opacity-50">
            {{ 'notifications.loadMore' | translate }}
          </button>
        </div>
      }
    }
  }
</app-card>
