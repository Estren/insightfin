<app-page-header title="Categories">
  <button
    (click)="openCreateForm()"
    class="bg-primary hover:bg-primary/90 cursor-pointer rounded-lg px-4 py-2 text-sm font-medium text-white transition-colors">
    + New Category
  </button>
</app-page-header>

@if (categoryStore.loading$ | async) {
  <app-loading />
} @else if (categoryStore.categories$ | async; as categories) {
  <app-card>
    <!-- Filter tabs -->
    <div class="border-border -mx-6 -mt-6 mb-6 border-b">
      <div class="px-6">
        <app-tabs [tabs]="filterTabs" [active]="activeFilterTab" (tabChange)="onFilterChange($event)" />
      </div>
    </div>

    @if (categories.length === 0) {
      <app-empty-state
        title="No categories yet"
        description="Create your first category to start organising transactions." />
    } @else {
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
        @for (cat of categories; track cat.id) {
          <div class="bg-background rounded-lg border p-4 shadow-sm">
            <div class="mb-3 flex items-start justify-between">
              <div class="flex items-center gap-2">
                @if (cat.color) {
                  <div class="h-8 w-8 flex-shrink-0 rounded-md" [style.backgroundColor]="cat.color"></div>
                }
                <div>
                  <p class="text-foreground text-sm font-semibold">{{ cat.name }}</p>
                  <span
                    class="text-xs font-medium"
                    [ngClass]="cat.type === 'INCOME' ? 'text-green-500' : 'text-red-500'">
                    {{ cat.type }}
                  </span>
                </div>
              </div>
              <div class="flex gap-2">
                <button
                  (click)="openEditForm(cat)"
                  class="text-muted-foreground hover:text-foreground cursor-pointer text-sm transition-colors">
                  Edit
                </button>
                <button
                  (click)="onDelete(cat)"
                  class="cursor-pointer text-sm text-red-500 transition-colors hover:text-red-700">
                  Delete
                </button>
              </div>
            </div>
          </div>
        }
      </div>
    }
  </app-card>
}

<!-- Create / Edit modal -->
@if (showForm) {
  <app-modal [title]="editingCategory ? 'Edit Category' : 'New Category'" (close)="cancelForm()">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="text-foreground mb-1 block text-sm font-medium">Name</label>
        <input
          formControlName="name"
          type="text"
          class="border-input bg-background text-foreground w-full rounded-md border px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="text-foreground mb-1 block text-sm font-medium">Type</label>
        <select
          formControlName="type"
          class="border-input bg-background text-foreground w-full cursor-pointer rounded-md border px-3 py-2 text-sm">
          <option value="EXPENSE">Expense</option>
          <option value="INCOME">Income</option>
        </select>
      </div>
      <div>
        <label class="text-foreground mb-1 block text-sm font-medium">Color</label>
        <input
          formControlName="color"
          type="color"
          class="border-input h-10 w-full cursor-pointer rounded-md border p-1" />
      </div>
      <button
        type="submit"
        [disabled]="form.invalid"
        class="bg-primary hover:bg-primary/90 mt-2 w-full cursor-pointer rounded-lg px-4 py-2.5 text-sm font-medium text-white transition-colors disabled:cursor-not-allowed disabled:opacity-50">
        {{ editingCategory ? 'Save Changes' : 'Create Category' }}
      </button>
    </form>
  </app-modal>
}
