<!-- Type toggle -->
<div>
  <label class="text-foreground mb-2 block text-sm font-medium">{{ 'transactions.type' | translate }}</label>
  <div class="flex gap-2">
    <button
      type="button"
      (click)="form.controls['type'].setValue('EXPENSE')"
      class="flex-1 cursor-pointer rounded-md px-3 py-2 text-sm font-medium transition-colors"
      [ngClass]="
        form.controls['type'].value === 'EXPENSE'
          ? 'bg-red-500 text-white'
          : 'bg-muted text-muted-foreground hover:bg-muted/80'
      ">
      {{ 'transactions.expense' | translate }}
    </button>
    <button
      type="button"
      (click)="form.controls['type'].setValue('INCOME')"
      class="flex-1 cursor-pointer rounded-md px-3 py-2 text-sm font-medium transition-colors"
      [ngClass]="
        form.controls['type'].value === 'INCOME'
          ? 'bg-green-500 text-white'
          : 'bg-muted text-muted-foreground hover:bg-muted/80'
      ">
      {{ 'transactions.income' | translate }}
    </button>
  </div>
</div>

<!-- Category -->
<div>
  <label class="text-foreground mb-1 block text-sm font-medium">{{ 'transactions.category' | translate }}</label>
  <select
    formControlName="categoryId"
    class="border-input bg-background text-foreground w-full cursor-pointer rounded-md border px-3 py-2 text-sm">
    <option value="" disabled>{{ 'common.selectCategory' | translate }}</option>
    @for (cat of filteredCategories$ | async; track cat.id) {
      <option [value]="cat.id">{{ cat.name }}</option>
    }
  </select>
</div>

<!-- Amount -->
<div>
  <label class="text-foreground mb-1 block text-sm font-medium">{{ 'transactions.amount' | translate }}</label>
  <input
    formControlName="amount"
    type="number"
    step="0.01"
    min="0.01"
    placeholder="0.00"
    class="border-input bg-background text-foreground w-full rounded-md border px-3 py-2 text-sm" />
</div>

<!-- Description -->
<div>
  <label class="text-foreground mb-1 block text-sm font-medium">
    {{ 'transactions.description' | translate }} <span class="text-muted-foreground">{{ 'common.optional' | translate }}</span>
  </label>
  <input
    formControlName="description"
    type="text"
    class="border-input bg-background text-foreground w-full rounded-md border px-3 py-2 text-sm" />
</div>

<!-- Date -->
<div>
  <label class="text-foreground mb-1 block text-sm font-medium">{{ 'transactions.date' | translate }}</label>
  <input
    formControlName="date"
    type="date"
    class="border-input bg-background text-foreground w-full rounded-md border px-3 py-2 text-sm" />
</div>
