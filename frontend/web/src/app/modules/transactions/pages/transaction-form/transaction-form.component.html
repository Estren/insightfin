<app-modal [title]="editing ? 'Edit Transaction' : 'New Transaction'" (close)="onCancel()">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <!-- Type toggle -->
    <div>
      <label class="text-foreground mb-2 block text-sm font-medium">Type</label>
      <div class="flex gap-2">
        <button
          type="button"
          (click)="form.controls['type'].setValue('EXPENSE')"
          class="flex-1 cursor-pointer rounded-md px-3 py-2 text-sm font-medium transition-colors"
          [ngClass]="
            form.controls['type'].value === 'EXPENSE'
              ? 'bg-red-500 text-white'
              : 'bg-muted text-muted-foreground hover:bg-muted/80'
          ">
          Expense
        </button>
        <button
          type="button"
          (click)="form.controls['type'].setValue('INCOME')"
          class="flex-1 cursor-pointer rounded-md px-3 py-2 text-sm font-medium transition-colors"
          [ngClass]="
            form.controls['type'].value === 'INCOME'
              ? 'bg-green-500 text-white'
              : 'bg-muted text-muted-foreground hover:bg-muted/80'
          ">
          Income
        </button>
      </div>
    </div>

    <!-- Category -->
    <div>
      <label class="text-foreground mb-1 block text-sm font-medium">Category</label>
      <select
        formControlName="categoryId"
        class="border-input bg-background text-foreground w-full cursor-pointer rounded-md border px-3 py-2 text-sm">
        <option value="" disabled>Select a category</option>
        @for (cat of filteredCategories$ | async; track cat.id) {
          <option [value]="cat.id">{{ cat.name }}</option>
        }
      </select>
    </div>

    <!-- Amount -->
    <div>
      <label class="text-foreground mb-1 block text-sm font-medium">Amount</label>
      <input
        formControlName="amount"
        type="number"
        step="0.01"
        min="0.01"
        placeholder="0.00"
        class="border-input bg-background text-foreground w-full rounded-md border px-3 py-2 text-sm" />
    </div>

    <!-- Description -->
    <div>
      <label class="text-foreground mb-1 block text-sm font-medium">
        Description <span class="text-muted-foreground">(optional)</span>
      </label>
      <input
        formControlName="description"
        type="text"
        class="border-input bg-background text-foreground w-full rounded-md border px-3 py-2 text-sm" />
    </div>

    <!-- Date -->
    <div>
      <label class="text-foreground mb-1 block text-sm font-medium">Date</label>
      <input
        formControlName="date"
        type="date"
        class="border-input bg-background text-foreground w-full rounded-md border px-3 py-2 text-sm" />
    </div>

    @if (errorMessage) {
      <div class="rounded-md bg-red-50 p-3 text-sm text-red-600 dark:bg-red-900/20 dark:text-red-400">
        {{ errorMessage }}
      </div>
    }

    <button
      type="submit"
      [disabled]="form.invalid || submitting"
      class="bg-primary hover:bg-primary/90 mt-2 w-full cursor-pointer rounded-lg px-4 py-2.5 text-sm font-medium text-white transition-colors disabled:cursor-not-allowed disabled:opacity-50">
      {{ editing ? 'Save Changes' : 'Create Transaction' }}
    </button>
  </form>
</app-modal>
