<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="50%" style="stop-color:#14B8A6"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
    <clipPath id="clip">
      <rect x="0" y="0" width="120" height="60"/>
    </clipPath>
  </defs>

  <!-- Sun (upper half) -->
  <g clip-path="url(#clip)">
    <circle cx="60" cy="60" r="30" fill="url(#sunGrad)"/>
  </g>

  <!-- Rays -->
  <g stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <line x1="60" y1="20" x2="60" y2="12"/>
    <line x1="78" y1="24" x2="83" y2="17"/>
    <line x1="92" y1="38" x2="99" y2="34"/>
    <line x1="42" y1="24" x2="37" y2="17"/>
    <line x1="28" y1="38" x2="21" y2="34"/>
  </g>

  <!-- Horizon line -->
  <line x1="15" y1="60" x2="105" y2="60" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Reflection (subtle) -->
  <g clip-path="url(#reflectionClip)" opacity="0.15">
    <clipPath id="reflectionClip">
      <rect x="0" y="60" width="120" height="30"/>
    </clipPath>
    <circle cx="60" cy="60" r="30" fill="#0D9488"/>
  </g>
</svg>
