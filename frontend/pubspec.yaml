name: orizon
description: "Orizon - Personal financial management platform."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.2

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.0

  # Dependency Injection
  get_it: ^7.6.4

  # Routing
  go_router: ^13.0.0

  # Functional Programming
  dartz: ^0.10.1

  # Local Storage
  shared_preferences: ^2.2.2

  # UI
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

flutter:
  generate: true
  uses-material-design: true
